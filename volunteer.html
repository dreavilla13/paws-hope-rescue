<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paws & Hope Rescue | Volunteer</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <a href="index.html" class="logo-banner">
      <img src="images/logo-banner.png" alt="Paws & Hope Rescue Logo">
    </a>
  
    <button class="hamburger" onclick="toggleMenu()">☰</button>
  
    <nav id="main-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="volunteer.html">Volunteer</a></li>
        <li><a href="resources.html">Resources</a></li>
        <li><a href="adopt.html">Adopt</a></li>
        <li><a href="gallery.html">Gallery</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2>Volunteer Application</h2>

    <form action="#" method="post">
      <fieldset>
        <legend>Personal Information</legend>

        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname" required>

        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone">

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob">
      </fieldset>

      <fieldset>
        <legend>Volunteer Details</legend>

        <label for="availability">Availability:</label>
        <input type="text" id="availability" name="availability">

        <label for="experience">Animal Experience:</label>
        <input type="text" id="experience" name="experience">

        <label for="interest">Area of Interest:</label>
        <input type="text" id="interest" name="interest">

        <label for="hours">Hours Per Week:</label>
        <input type="number" id="hours" name="hours" min="1" max="40">

        <label for="reference">Reference Name:</label>
        <input type="text" id="reference" name="reference">
      </fieldset>

      <button type="submit">Submit Application</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 Paws & Hope Rescue. All rights reserved.</p>
  </footer>
</body>
</html>
